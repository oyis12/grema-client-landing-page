<!doctype html>
<html lang="en">
  <head>
    <!-- Basic Setup -->
    <meta charset="UTF-8" />
     <link rel="icon" type="image/svg+xml" href="/logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary SEO -->
    <title>Quality Rugs & Carpets in Abuja | Grema Rugs Nigeria</title>
    <meta
      name="description"
      content="Buy high-quality rugs and carpets in Abuja, Nigeria. Grema Rugs offers modern, luxury, and affordable carpets for homes, offices, and mosques."
    />
    <meta
      name="keywords"
      content="rugs in Abuja, carpets in Abuja, Nigerian carpets, luxury rugs Nigeria, affordable rugs Abuja, mosque carpets Abuja"
    />
    <meta name="author" content="Grema Rugs Nigeria" />

    <!-- Local SEO -->
    <meta name="geo.region" content="NG-FC" />
    <meta name="geo.placename" content="Abuja" />
    <meta name="geo.position" content="9.0765;7.3986" />
    <meta name="ICBM" content="9.0765, 7.3986" />

    <!-- Open Graph (WhatsApp, Facebook, etc.) -->
    <meta property="og:title" content="Grema Rugs - Premium Rugs & Carpets in Abuja" />
    <meta
      property="og:description"
      content="Shop quality rugs and carpets in Abuja. Affordable, luxury, and modern designs available."
    />
    <meta property="og:image" content="/grema_logo.jpeg" />
    <meta property="og:url" content="https://yourdomain.com" />
    <meta property="og:type" content="website" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Grema Rugs Abuja" />
    <meta name="twitter:description" content="Best rugs and carpets in Abuja, Nigeria." />
    <meta name="twitter:image" content="/grema_logo.jpeg" />

    <!-- Canonical URL -->
    <link rel="canonical" href="https://yourdomain.com" />

    <!-- Structured Data (Local Business SEO) -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Store",
        "name": "Grema Rugs Nigeria",
        "image": "https://yourdomain.com/grema_logo.jpeg",
        "description": "Grema Rugs Nigeria sells high-quality rugs and carpets in Abuja for homes, offices, and mosques.",
        "address": {
          "@type": "PostalAddress",
          "addressLocality": "Abuja",
          "addressRegion": "FCT",
          "addressCountry": "NG"
        },
        "areaServed": "Abuja",
        "telephone": "+2348184343338",
        "url": "https://gremacarpet.com/",
        "sameAs": [
          "https://instagram.com/yourpage",
          "https://facebook.com/yourpage"
        ]
      }
    </script>
  </head>

  <body>
    <div id="root"></div>

    <!-- React App Entry -->
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
